name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # Snake Light
      - name: Generate Snake Light
        uses: Platane/snk@v3
        with:
          github_user_name: johntvale
          outputs: |
            dist/github-contribution-grid-snake-light.svg
          snake_colors: "#F7DF1E,#61DAFB,#4CAF50"

      # Snake Dark
      - name: Generate Snake Dark
        uses: Platane/snk@v3
        with:
          github_user_name: johntvale
          outputs: |
            dist/github-contribution-grid-snake-dark.svg
          snake_colors: "#FFD93D,#21A1F1,#2ECC71"

      # Deploy para branch output
      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
