name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"  # Executa a cada 12 horas
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # Gerar Snake único
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: johntvale
          outputs: |
            dist/github-contribution-grid-snake.svg
          palette: github  # Paleta padrão do GitHub

      # Deploy para branch output
      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
